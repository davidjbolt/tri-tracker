<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sprint Tri Tracker — Sept 12</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,300&display=swap" rel="stylesheet">
<style>
  :root {
    --swim: #0e7490; --swim-bg: #ecfeff;
    --bike: #1d4ed8; --bike-bg: #eff6ff;
    --run: #b45309; --run-bg: #fffbeb;
    --weights: #7c3aed; --weights-bg: #f5f3ff;
    --brick: #be185d; --brick-bg: #fdf2f8;
    --rest: #6b7280; --rest-bg: #f9fafb;
    --done: #16a34a;
    --ink: #1a1a1a;
    --paper: #faf9f7;
    --cream: #f3f0ea;
    --border: #e2ddd5;
    --muted: #78716c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Mono', monospace;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--ink);
    color: #fff;
    padding: 2rem 2rem 1.5rem;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(45deg, transparent, transparent 40px, rgba(255,255,255,.03) 40px, rgba(255,255,255,.03) 41px);
  }
  .header-inner { position: relative; max-width: 900px; margin: 0 auto; }
  .race-label {
    font-size: 10px; letter-spacing: .2em; text-transform: uppercase;
    color: rgba(255,255,255,.5); margin-bottom: .5rem;
  }
  h1 {
    font-family: 'Fraunces', serif;
    font-size: clamp(1.8rem, 5vw, 3rem);
    font-weight: 700; line-height: 1.1;
    margin-bottom: .75rem;
  }
  h1 em { font-style: italic; font-weight: 300; }
  .header-meta {
    display: flex; gap: 2rem; align-items: center; flex-wrap: wrap;
    font-size: 11px; color: rgba(255,255,255,.6);
  }
  .header-meta strong { color: #fff; }

  /* PROGRESS BAR */
  .progress-section {
    background: var(--cream); border-bottom: 1px solid var(--border);
    padding: 1.25rem 2rem;
  }
  .progress-inner { max-width: 900px; margin: 0 auto; }
  .progress-stats {
    display: flex; gap: 2rem; flex-wrap: wrap;
    margin-bottom: .75rem; font-size: 11px; color: var(--muted);
  }
  .progress-stats span strong { color: var(--ink); font-size: 18px; display: block; line-height: 1.2; }
  .progress-bar-wrap {
    background: #ddd9d0; border-radius: 2px; height: 6px; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%; border-radius: 2px;
    background: linear-gradient(90deg, #0e7490, #1d4ed8, #b45309);
    transition: width .6s ease;
  }
  .discipline-bars { display: flex; gap: 1rem; margin-top: .75rem; flex-wrap: wrap; }
  .disc-bar { display: flex; align-items: center; gap: .5rem; font-size: 10px; }
  .disc-bar-track { width: 80px; height: 4px; background: #ddd9d0; border-radius: 2px; overflow: hidden; }
  .disc-bar-fill { height: 100%; border-radius: 2px; transition: width .4s ease; }

  /* PHASE TABS */
  .phase-nav {
    background: #fff; border-bottom: 1px solid var(--border);
    padding: 0 2rem; overflow-x: auto;
  }
  .phase-nav-inner { max-width: 900px; margin: 0 auto; display: flex; gap: 0; }
  .phase-btn {
    background: none; border: none; cursor: pointer;
    font-family: 'DM Mono', monospace; font-size: 11px;
    padding: .75rem 1.25rem; letter-spacing: .08em; text-transform: uppercase;
    color: var(--muted); border-bottom: 2px solid transparent;
    transition: all .15s; white-space: nowrap;
  }
  .phase-btn.active { color: var(--ink); border-bottom-color: var(--ink); }
  .phase-btn:hover:not(.active) { color: var(--ink); }

  /* MAIN */
  main { max-width: 900px; margin: 0 auto; padding: 1.5rem 2rem 4rem; }
  .phase-note {
    background: var(--cream); border: 1px solid var(--border);
    border-radius: 4px; padding: 1rem 1.25rem;
    font-size: 12px; line-height: 1.7; color: var(--muted);
    margin-bottom: 1.5rem;
  }
  .phase-note strong { color: var(--ink); }

  /* WEEK */
  .week { margin-bottom: 1rem; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  .week-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: .75rem 1rem; background: #fff; cursor: pointer;
    transition: background .1s;
  }
  .week-header:hover { background: var(--cream); }
  .week-label { font-size: 12px; font-weight: 500; letter-spacing: .05em; }
  .week-dates { font-size: 10px; color: var(--muted); }
  .week-progress { display: flex; align-items: center; gap: .75rem; }
  .week-pips { display: flex; gap: 3px; }
  .pip {
    width: 8px; height: 8px; border-radius: 50%;
    border: 1.5px solid var(--border); background: #fff;
    transition: all .15s;
  }
  .pip.done { background: var(--done); border-color: var(--done); }
  .pip.rest { background: var(--border); border-color: var(--border); }
  .week-pct { font-size: 10px; color: var(--muted); min-width: 28px; text-align: right; }
  .week-chevron { font-size: 10px; color: var(--muted); transition: transform .2s; }
  .week-chevron.open { transform: rotate(180deg); }
  .week-complete { background: #f0fdf4; }
  .week-complete .week-header { background: #f0fdf4; }

  /* DAYS */
  .week-days { display: none; border-top: 1px solid var(--border); }
  .week-days.open { display: block; }
  .day-row {
    display: flex; align-items: flex-start; gap: .75rem;
    padding: .875rem 1rem; border-bottom: 1px solid var(--border);
    transition: background .1s;
  }
  .day-row:last-child { border-bottom: none; }
  .day-row.completed { background: #fafffe; }
  .day-row.rest-day { opacity: .6; }

  .day-check {
    width: 20px; height: 20px; border-radius: 4px;
    border: 1.5px solid var(--border); background: #fff;
    cursor: pointer; flex-shrink: 0; margin-top: 1px;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s; font-size: 11px;
  }
  .day-check:hover { border-color: var(--done); }
  .day-check.checked { background: var(--done); border-color: var(--done); color: #fff; }
  .day-check.rest-check { cursor: default; background: var(--rest-bg); }

  .day-info { flex: 1; min-width: 0; }
  .day-name-label { font-size: 10px; color: var(--muted); letter-spacing: .07em; text-transform: uppercase; margin-bottom: 3px; }
  .day-title { font-size: 13px; font-weight: 500; line-height: 1.3; }
  .day-detail { font-size: 11px; color: var(--muted); margin-top: 3px; line-height: 1.5; }

  .disc-badge {
    font-size: 9px; letter-spacing: .1em; text-transform: uppercase;
    padding: 2px 7px; border-radius: 3px; font-weight: 500;
    flex-shrink: 0; margin-top: 3px;
  }
  .badge-swim { background: var(--swim-bg); color: var(--swim); }
  .badge-bike { background: var(--bike-bg); color: var(--bike); }
  .badge-run { background: var(--run-bg); color: var(--run); }
  .badge-weights { background: var(--weights-bg); color: var(--weights); }
  .badge-brick { background: var(--brick-bg); color: var(--brick); }
  .badge-rest { background: var(--rest-bg); color: var(--rest); }

  /* RACE DAY */
  .race-day-card {
    background: var(--ink); color: #fff;
    border-radius: 8px; padding: 2rem; text-align: center;
    margin: 1.5rem 0;
  }
  .race-day-card .race-icon { font-size: 3rem; margin-bottom: .75rem; }
  .race-day-card h2 { font-family: 'Fraunces', serif; font-size: 1.5rem; margin-bottom: .5rem; }
  .race-day-card p { font-size: 12px; color: rgba(255,255,255,.6); }

  @media (max-width: 600px) {
    header, .progress-section, .phase-nav, main { padding-left: 1rem; padding-right: 1rem; }
    .progress-stats { gap: 1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="race-label">Sprint Triathlon</div>
    <h1>16 Weeks to <em>race day</em></h1>
    <div class="header-meta">
      <span><strong>Sept 12, 2025</strong> race date</span>
      <span><strong>750m</strong> swim</span>
      <span><strong>20km</strong> bike</span>
      <span><strong>5km</strong> run</span>
      <span><strong>6 days/wk</strong></span>
    </div>
  </div>
</header>

<div class="progress-section">
  <div class="progress-inner">
    <div class="progress-stats">
      <span><strong id="stat-done">0</strong>workouts done</span>
      <span><strong id="stat-total">0</strong>total workouts</span>
      <span><strong id="stat-pct">0%</strong>complete</span>
      <span><strong id="stat-weeks">0</strong>weeks finished</span>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="main-bar" style="width:0%"></div>
    </div>
    <div class="discipline-bars">
      <div class="disc-bar"><span>🏊</span><div class="disc-bar-track"><div class="disc-bar-fill" id="bar-swim" style="width:0%;background:var(--swim)"></div></div><span id="lbl-swim">0%</span></div>
      <div class="disc-bar"><span>🚴</span><div class="disc-bar-track"><div class="disc-bar-fill" id="bar-bike" style="width:0%;background:var(--bike)"></div></div><span id="lbl-bike">0%</span></div>
      <div class="disc-bar"><span>🏃</span><div class="disc-bar-track"><div class="disc-bar-fill" id="bar-run" style="width:0%;background:var(--run)"></div></div><span id="lbl-run">0%</span></div>
      <div class="disc-bar"><span>🏋️</span><div class="disc-bar-track"><div class="disc-bar-fill" id="bar-weights" style="width:0%;background:var(--weights)"></div></div><span id="lbl-weights">0%</span></div>
    </div>
  </div>
</div>

<div class="phase-nav">
  <div class="phase-nav-inner">
    <button class="phase-btn active" onclick="showPhase(0)">Phase 1 · Base</button>
    <button class="phase-btn" onclick="showPhase(1)">Phase 2 · Build</button>
    <button class="phase-btn" onclick="showPhase(2)">Phase 3 · Sharpen</button>
    <button class="phase-btn" onclick="showPhase(3)">Phase 4 · Taper</button>
  </div>
</div>

<main id="main-content"></main>

<script>
// ─── PLAN DATA ───────────────────────────────────────────────────────────────
// Race is Sept 12. Week 1 starts May 19 (16 weeks out).
const RACE_DATE = new Date('2025-09-12');
const WEEK1_START = new Date('2025-05-19');

const DAY_NAMES = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

const PHASES = [
  { id: 0, label: 'Phase 1 · Base', weeks: [1,2,3,4], note: '<strong>Focus: Build swim technique, easy run start, maintain bike.</strong> Swimming is your biggest unknown — this phase is about getting comfortable in the water. Run is intentionally very easy to protect the sciatica. Bike stays zone 2.' },
  { id: 1, label: 'Phase 2 · Build', weeks: [5,6,7,8,9,10], note: '<strong>Focus: Volume increases across all three disciplines.</strong> Run build continues conservatively. Swim distances grow past race distance. Bike stays zone 2 — your fitness is already there, no need to push it.' },
  { id: 2, label: 'Phase 3 · Sharpen', weeks: [11,12,13,14], note: '<strong>Focus: Race-specific work, brick sessions, confidence building.</strong> You\'ll run the full 5km in training multiple times. Brick workouts (bike → run) prepare your legs for the transition. Swim stays solid.' },
  { id: 3, label: 'Phase 4 · Taper', weeks: [15,16], note: '<strong>Focus: Rest, sharpen, arrive fresh.</strong> Volume drops significantly. Intensity stays briefly to keep the legs sharp. Trust your training. Race week is about rest, nutrition, and logistics.' },
];

// Template day structures per phase
function makeWeek(weekNum) {
  const p = weekNum <= 4 ? 1 : weekNum <= 10 ? 2 : weekNum <= 14 ? 3 : 4;
  
  const templates = {
    1: [ // Phase 1
      { disc: 'swim', title: 'Technique swim', detail: '30–40 min. Drills focus: catch-up drill, side kick. Keep it easy.' },
      { disc: 'bike', title: 'Zone 2 ride', detail: '45 min easy. Conversational pace. Spin out the legs.' },
      { disc: 'run', title: 'Easy run/walk', detail: `${Math.min(15 + weekNum * 2, 25)} min. Walk breaks as needed. Sciatica check: stop if pain spikes.` },
      { disc: 'swim', title: 'Endurance swim', detail: `${300 + weekNum * 50}m continuous. Focus on breathing rhythm.` },
      { disc: 'weights', title: 'Strength A', detail: 'Deadlift 3×8 · Goblet squat 3×10 · Clamshell 2×20 · Face pull 3×15 · Bird dog 3×10/side' },
      { disc: 'bike', title: 'Long zone 2 ride', detail: `${50 + weekNum * 5} min. Relaxed, steady. Fuel during if over 60 min.` },
      { disc: 'rest', title: 'Rest day', detail: 'Full rest or 15 min light mobility/stretching.' },
    ],
    2: [ // Phase 2
      { disc: 'swim', title: 'Technique + distance swim', detail: `${500 + (weekNum - 4) * 50}m. Mix drills with continuous laps.` },
      { disc: 'bike', title: 'Zone 2 ride', detail: '50 min easy. Maintain cadence around 85–90 rpm.' },
      { disc: 'run', title: 'Building run', detail: `${20 + (weekNum - 4) * 3} min easy. No walk breaks needed by now unless sciatica flares.` },
      { disc: 'swim', title: 'Endurance swim', detail: `${700 + (weekNum - 4) * 50}m. By week 8 you're exceeding race distance.` },
      { disc: 'weights', title: 'Strength B', detail: 'Romanian deadlift 3×10 · Split squat 3×8 · Seated row 3×12 · Band pull-apart 3×15 · Plank 3×30s' },
      { disc: 'bike', title: 'Long zone 2 ride', detail: `${60 + (weekNum - 4) * 5} min. Eat and drink on the bike — practice your race nutrition.` },
      { disc: 'rest', title: 'Rest day', detail: 'Full rest. Foam roll if legs are tight.' },
    ],
    3: [ // Phase 3
      { disc: 'swim', title: 'Race-pace swim', detail: '800–1000m. Include 4×100m at race effort with 20s rest.' },
      { disc: 'brick', title: 'Brick workout', detail: `Bike ${40 + (weekNum - 10) * 5} min zone 2–3, then immediately run 15–20 min. Practice T2 transition.` },
      { disc: 'run', title: 'Tempo run', detail: `${25 + (weekNum - 10) * 5} min. Include 10 min at a comfortably hard pace in the middle.` },
      { disc: 'swim', title: 'Open water practice', detail: '800m. If possible, get in open water at least once. Practice sighting.' },
      { disc: 'weights', title: 'Strength (lighter)', detail: 'Reduce weights 15%. Deadlift 2×8 · Squat 2×10 · Clamshell 2×20 · Face pull 2×15. Recovery focused.' },
      { disc: 'bike', title: 'Moderate ride', detail: '60 min zone 2. Legs should feel good — if tired, cut to 40 min.' },
      { disc: 'rest', title: 'Rest day', detail: 'Rest. Prep gear. Practice your transitions mentally.' },
    ],
    4: [ // Phase 4 taper
      { disc: 'swim', title: 'Easy swim', detail: weekNum === 15 ? '600m easy. Keep your feel for the water.' : '400m. Very easy. Just staying loose.' },
      { disc: 'bike', title: 'Short zone 2 ride', detail: weekNum === 15 ? '40 min easy.' : weekNum === 16 ? '20 min shakeout. Check your bike is race-ready.' : '30 min.' },
      { disc: 'run', title: 'Easy short run', detail: weekNum === 15 ? '20 min very easy.' : '10–15 min shake-out jog. Race pace for 2 min at end.' },
      { disc: 'swim', title: 'Race prep swim', detail: weekNum === 16 ? '300m very easy — last swim before race!' : '500m easy.' },
      { disc: 'weights', title: weekNum === 16 ? 'Rest — skip weights' : 'Light strength', detail: weekNum === 16 ? 'No weights race week.' : 'Bodyweight only. Squat 2×10, clamshell 2×15. Nothing taxing.' },
      { disc: weekNum === 16 ? 'rest' : 'bike', title: weekNum === 16 ? 'Rest / gear check' : 'Easy spin', detail: weekNum === 16 ? 'Full rest. Lay out all your gear. Sleep early.' : '30 min very easy spin.' },
      { disc: 'rest', title: weekNum === 16 ? '🏁 RACE DAY — Sept 12!' : 'Rest day', detail: weekNum === 16 ? '750m swim · 20km bike · 5km run. You\'ve got this!' : 'Rest. You\'ve earned it.' },
    ],
  };

  return templates[p].map((d, i) => ({
    ...d,
    id: `w${weekNum}d${i+1}`,
    dayName: DAY_NAMES[i],
  }));
}

function getWeekStart(weekNum) {
  const d = new Date(WEEK1_START);
  d.setDate(d.getDate() + (weekNum - 1) * 7);
  return d;
}

function formatDate(d) {
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

// ─── STORAGE ─────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'tri_tracker_v1';
let completed = {};

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) completed = JSON.parse(raw);
  } catch(e) { completed = {}; }
}

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(completed)); } catch(e) {}
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
let currentPhase = 0;

function discClass(disc) {
  return `badge-${disc}`;
}

function discLabel(disc) {
  return { swim:'swim', bike:'bike', run:'run', weights:'weights', brick:'brick', rest:'rest' }[disc] || disc;
}

function renderWeek(weekNum) {
  const days = makeWeek(weekNum);
  const start = getWeekStart(weekNum);
  const end = new Date(start); end.setDate(end.getDate() + 6);
  
  const workoutDays = days.filter(d => d.disc !== 'rest');
  const doneDays = workoutDays.filter(d => completed[d.id]);
  const allDone = workoutDays.length > 0 && doneDays.length === workoutDays.length;
  const pct = workoutDays.length ? Math.round(doneDays.length / workoutDays.length * 100) : 0;
  
  const pips = days.map(d => {
    if (d.disc === 'rest') return `<div class="pip rest" title="${d.dayName}: Rest"></div>`;
    return `<div class="pip ${completed[d.id] ? 'done' : ''}" title="${d.dayName}: ${d.title}"></div>`;
  }).join('');

  const daysHtml = days.map(d => {
    const isRest = d.disc === 'rest';
    const isDone = completed[d.id];
    return `
      <div class="day-row ${isDone ? 'completed' : ''} ${isRest ? 'rest-day' : ''}" id="row-${d.id}">
        <div class="day-check ${isDone ? 'checked' : ''} ${isRest ? 'rest-check' : ''}"
          onclick="${isRest ? '' : `toggle('${d.id}')`}"
          title="${isRest ? 'Rest day' : isDone ? 'Mark incomplete' : 'Mark complete'}"
        >${isDone ? '✓' : ''}</div>
        <div class="day-info">
          <div class="day-name-label">${d.dayName}</div>
          <div class="day-title">${d.title}</div>
          <div class="day-detail">${d.detail}</div>
        </div>
        <div class="disc-badge ${discClass(d.disc)}">${discLabel(d.disc)}</div>
      </div>`;
  }).join('');

  return `
    <div class="week ${allDone ? 'week-complete' : ''}" id="week-${weekNum}">
      <div class="week-header" onclick="toggleWeek(${weekNum})">
        <div>
          <div class="week-label">Week ${weekNum} ${allDone ? '✓' : ''}</div>
          <div class="week-dates">${formatDate(start)} – ${formatDate(end)}</div>
        </div>
        <div class="week-progress">
          <div class="week-pips">${pips}</div>
          <div class="week-pct">${pct}%</div>
          <div class="week-chevron" id="chev-${weekNum}">▼</div>
        </div>
      </div>
      <div class="week-days" id="days-${weekNum}">${daysHtml}</div>
    </div>`;
}

function showPhase(phaseIdx) {
  currentPhase = phaseIdx;
  document.querySelectorAll('.phase-btn').forEach((b, i) => b.classList.toggle('active', i === phaseIdx));
  
  const phase = PHASES[phaseIdx];
  const el = document.getElementById('main-content');
  
  let html = `<div class="phase-note">${phase.note}</div>`;
  
  phase.weeks.forEach(wk => {
    if (wk === 16) {
      html += `<div class="race-day-card">
        <div class="race-icon">🏁</div>
        <h2>Race Day — September 12</h2>
        <p>750m swim · 20km bike · 5km run<br>Seed at the back, start easy, trust your training.</p>
      </div>`;
    }
    html += renderWeek(wk);
  });
  
  el.innerHTML = html;
  updateStats();
}

function toggleWeek(weekNum) {
  const days = document.getElementById(`days-${weekNum}`);
  const chev = document.getElementById(`chev-${weekNum}`);
  days.classList.toggle('open');
  chev.classList.toggle('open');
}

function toggle(id) {
  completed[id] = !completed[id];
  save();
  // Re-render current phase to update pips, week state etc.
  showPhase(currentPhase);
}

// ─── STATS ───────────────────────────────────────────────────────────────────
function updateStats() {
  let total = 0, done = 0;
  let disc = { swim: [0,0], bike: [0,0], run: [0,0], weights: [0,0] };
  let weeksComplete = 0;

  for (let w = 1; w <= 16; w++) {
    const days = makeWeek(w);
    const workouts = days.filter(d => d.disc !== 'rest');
    const weekDone = workouts.filter(d => completed[d.id]).length;
    if (workouts.length > 0 && weekDone === workouts.length) weeksComplete++;
    workouts.forEach(d => {
      total++;
      if (completed[d.id]) done++;
      const key = ['swim','bike','run','weights'].includes(d.disc) ? d.disc : d.disc === 'brick' ? 'bike' : null;
      if (key) {
        disc[key][0]++;
        if (completed[d.id]) disc[key][1]++;
      }
    });
  }

  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-pct').textContent = pct + '%';
  document.getElementById('stat-weeks').textContent = weeksComplete;
  document.getElementById('main-bar').style.width = pct + '%';

  ['swim','bike','run','weights'].forEach(d => {
    const p = disc[d][0] ? Math.round(disc[d][1] / disc[d][0] * 100) : 0;
    document.getElementById(`bar-${d}`).style.width = p + '%';
    document.getElementById(`lbl-${d}`).textContent = p + '%';
  });
}

// ─── INIT ────────────────────────────────────────────────────────────────────
load();
showPhase(0);
</script>
</body>
</html>

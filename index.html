<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dave's Tri Tracker — Sept 12</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,300&display=swap" rel="stylesheet">
<style>
  :root {
    --swim: #0e7490; --swim-bg: #ecfeff;
    --bike: #1d4ed8; --bike-bg: #eff6ff;
    --run: #b45309; --run-bg: #fffbeb;
    --weights: #7c3aed; --weights-bg: #f5f3ff;
    --brick: #be185d; --brick-bg: #fdf2f8;
    --rest: #6b7280; --rest-bg: #f9fafb;
    --tempo: #dc2626; --tempo-bg: #fef2f2;
    --done: #16a34a;
    --ink: #1a1a1a;
    --paper: #faf9f7;
    --cream: #f3f0ea;
    --border: #e2ddd5;
    --muted: #78716c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Mono', monospace; background: var(--paper); color: var(--ink); min-height: 100vh; }

  header { background: var(--ink); color: #fff; padding: 2rem 2rem 1.5rem; position: relative; overflow: hidden; }
  header::before { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(45deg, transparent, transparent 40px, rgba(255,255,255,.03) 40px, rgba(255,255,255,.03) 41px); }
  .header-inner { position: relative; max-width: 900px; margin: 0 auto; }
  .race-label { font-size: 10px; letter-spacing: .2em; text-transform: uppercase; color: rgba(255,255,255,.5); margin-bottom: .5rem; }
  h1 { font-family: 'Fraunces', serif; font-size: clamp(1.8rem, 5vw, 3rem); font-weight: 700; line-height: 1.1; margin-bottom: .75rem; }
  h1 em { font-style: italic; font-weight: 300; }
  .header-meta { display: flex; gap: 2rem; align-items: center; flex-wrap: wrap; font-size: 11px; color: rgba(255,255,255,.6); }
  .header-meta strong { color: #fff; }
  .header-tag { background: rgba(220,38,38,.25); color: #fca5a5; font-size: 10px; letter-spacing: .1em; text-transform: uppercase; padding: 2px 8px; border-radius: 3px; }

  .progress-section { background: var(--cream); border-bottom: 1px solid var(--border); padding: 1.25rem 2rem; }
  .progress-inner { max-width: 900px; margin: 0 auto; }
  .progress-stats { display: flex; gap: 2rem; flex-wrap: wrap; margin-bottom: .75rem; font-size: 11px; color: var(--muted); }
  .progress-stats span strong { color: var(--ink); font-size: 18px; display: block; line-height: 1.2; }
  .progress-bar-wrap { background: #ddd9d0; border-radius: 2px; height: 6px; overflow: hidden; }
  .progress-bar-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, #0e7490, #1d4ed8, #b45309); transition: width .6s ease; }
  .discipline-bars { display: flex; gap: 1rem; margin-top: .75rem; flex-wrap: wrap; }
  .disc-bar { display: flex; align-items: center; gap: .5rem; font-size: 10px; }
  .disc-bar-track { width: 80px; height: 4px; background: #ddd9d0; border-radius: 2px; overflow: hidden; }
  .disc-bar-fill { height: 100%; border-radius: 2px; transition: width .4s ease; }

  .phase-nav { background: #fff; border-bottom: 1px solid var(--border); padding: 0 2rem; overflow-x: auto; }
  .phase-nav-inner { max-width: 900px; margin: 0 auto; display: flex; }
  .phase-btn { background: none; border: none; cursor: pointer; font-family: 'DM Mono', monospace; font-size: 11px; padding: .75rem 1.25rem; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); border-bottom: 2px solid transparent; transition: all .15s; white-space: nowrap; }
  .phase-btn.active { color: var(--ink); border-bottom-color: var(--ink); }
  .phase-btn:hover:not(.active) { color: var(--ink); }

  main { max-width: 900px; margin: 0 auto; padding: 1.5rem 2rem 4rem; }
  .phase-note { background: var(--cream); border: 1px solid var(--border); border-radius: 4px; padding: 1rem 1.25rem; font-size: 12px; line-height: 1.7; color: var(--muted); margin-bottom: 1.5rem; }
  .phase-note strong { color: var(--ink); }
  .intensity-legend { background: #fef2f2; border: 1px solid #fecaca; border-radius: 4px; padding: .75rem 1.25rem; font-size: 11px; line-height: 1.7; color: var(--muted); margin-bottom: 1.5rem; }
  .intensity-legend strong { color: var(--tempo); }

  .week { margin-bottom: 1rem; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  .week-header { display: flex; align-items: center; justify-content: space-between; padding: .75rem 1rem; background: #fff; cursor: pointer; transition: background .1s; }
  .week-header:hover { background: var(--cream); }
  .week-label { font-size: 12px; font-weight: 500; letter-spacing: .05em; }
  .week-dates { font-size: 10px; color: var(--muted); }
  .week-progress { display: flex; align-items: center; gap: .75rem; }
  .week-pips { display: flex; gap: 3px; }
  .pip { width: 8px; height: 8px; border-radius: 50%; border: 1.5px solid var(--border); background: #fff; transition: all .15s; }
  .pip.done { background: var(--done); border-color: var(--done); }
  .pip.rest { background: var(--border); border-color: var(--border); }
  .pip.tempo { border-color: var(--tempo); }
  .week-pct { font-size: 10px; color: var(--muted); min-width: 28px; text-align: right; }
  .week-chevron { font-size: 10px; color: var(--muted); transition: transform .2s; }
  .week-chevron.open { transform: rotate(180deg); }
  .week-complete .week-header { background: #f0fdf4; }

  .week-days { display: none; border-top: 1px solid var(--border); }
  .week-days.open { display: block; }
  .day-row { display: flex; align-items: flex-start; gap: .75rem; padding: .875rem 1rem; border-bottom: 1px solid var(--border); transition: background .1s; }
  .day-row:last-child { border-bottom: none; }
  .day-row.completed { background: #fafffe; }
  .day-row.rest-day { opacity: .6; }
  .day-row.tempo-day { border-left: 3px solid var(--tempo); }

  .day-check { width: 20px; height: 20px; border-radius: 4px; border: 1.5px solid var(--border); background: #fff; cursor: pointer; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all .15s; font-size: 11px; }
  .day-check:hover { border-color: var(--done); }
  .day-check.checked { background: var(--done); border-color: var(--done); color: #fff; }
  .day-check.rest-check { cursor: default; background: var(--rest-bg); }

  .day-info { flex: 1; min-width: 0; }
  .day-name-label { font-size: 10px; color: var(--muted); letter-spacing: .07em; text-transform: uppercase; margin-bottom: 3px; }
  .day-title { font-size: 13px; font-weight: 500; line-height: 1.3; }
  .day-detail { font-size: 11px; color: var(--muted); margin-top: 3px; line-height: 1.5; }
  .tempo-note { font-size: 10px; color: var(--tempo); margin-top: 4px; font-weight: 500; }

  .disc-badge { font-size: 9px; letter-spacing: .1em; text-transform: uppercase; padding: 2px 7px; border-radius: 3px; font-weight: 500; flex-shrink: 0; margin-top: 3px; }
  .badge-swim { background: var(--swim-bg); color: var(--swim); }
  .badge-bike { background: var(--bike-bg); color: var(--bike); }
  .badge-run { background: var(--run-bg); color: var(--run); }
  .badge-weights { background: var(--weights-bg); color: var(--weights); }
  .badge-brick { background: var(--brick-bg); color: var(--brick); }
  .badge-rest { background: var(--rest-bg); color: var(--rest); }
  .badge-tempo-swim { background: var(--tempo-bg); color: var(--tempo); }
  .badge-tempo-bike { background: var(--tempo-bg); color: var(--tempo); }
  .badge-tempo-run { background: var(--tempo-bg); color: var(--tempo); }

  .race-day-card { background: var(--ink); color: #fff; border-radius: 8px; padding: 2rem; text-align: center; margin: 1.5rem 0; }
  .race-day-card h2 { font-family: 'Fraunces', serif; font-size: 1.5rem; margin-bottom: .5rem; }
  .race-day-card p { font-size: 12px; color: rgba(255,255,255,.6); }

  .str-week { border: 1px solid var(--border); border-radius: 6px; margin-bottom: .75rem; overflow: hidden; }
  .str-week-hdr { display: flex; align-items: center; justify-content: space-between; padding: .6rem 1rem; background: #fff; cursor: pointer; }
  .str-week-hdr:hover { background: var(--cream); }
  .str-days { display: none; border-top: 1px solid var(--border); }
  .str-days.open { display: block; }
  .str-session { border-bottom: 1px solid var(--border); }
  .str-session:last-child { border-bottom: none; }
  .str-session-hdr { display: flex; align-items: center; gap: .75rem; padding: .65rem 1rem; background: var(--cream); border-bottom: 1px solid var(--border); }
  .str-session-hdr .day-check { flex-shrink: 0; }
  .str-session-title { font-size: 12px; font-weight: 500; }
  .str-session-sub { font-size: 10px; color: var(--muted); }
  .str-ex-row { display: grid; grid-template-columns: 2fr 1fr 2fr; gap: 8px; padding: .6rem 1rem .6rem 2.75rem; border-bottom: 1px solid var(--border); align-items: start; }
  .str-ex-row:last-child { border-bottom: none; }
  .str-ex-name { font-size: 12px; font-weight: 500; }
  .str-ex-note { font-size: 10px; color: var(--muted); margin-top: 1px; }
  .str-sets { font-size: 11px; color: var(--muted); }
  .str-cue { font-size: 11px; color: var(--muted); line-height: 1.5; }
  .str-badge { font-size: 9px; letter-spacing: .08em; text-transform: uppercase; padding: 2px 6px; border-radius: 3px; font-weight: 500; display: inline-block; margin-top: 2px; }
  .str-lower { background: #eff6ff; color: #1d4ed8; }
  .str-upper { background: #f5f3ff; color: #7c3aed; }
  .str-core { background: #f0fdf4; color: #16a34a; }
  .str-complete { background: #f0fdf4; }
  .str-complete .str-week-hdr { background: #f0fdf4; }

  @media (max-width: 600px) {
    header, .progress-section, .phase-nav, main { padding-left: 1rem; padding-right: 1rem; }
    .progress-stats { gap: 1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="race-label">Sprint Triathlon — Dave</div>
    <h1>16 Weeks to <em>race day</em></h1>
    <div class="header-meta">
      <span><strong>Sept 12, 2025</strong> race date</span>
      <span><strong>750m</strong> swim</span>
      <span><strong>20km</strong> bike</span>
      <span><strong>5km</strong> run</span>
      <span><strong>6 days/wk</strong></span>
      <span class="header-tag">80/20 w/ tempo</span>
    </div>
  </div>
</header>

<div class="progress-section">
  <div class="progress-inner">
    <div class="progress-stats">
      <span><strong id="stat-done">0</strong>workouts done</span>
      <span><strong id="stat-total">0</strong>total workouts</span>
      <span><strong id="stat-pct">0%</strong>complete</span>
      <span><strong id="stat-weeks">0</strong>weeks finished</span>
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="main-bar" style="width:0%"></div></div>
    <div class="discipline-bars">
      <div class="disc-bar"><span>🏊</span><div class="disc-bar-track"><div class="disc-bar-fill" id="bar-swim" style="width:0%;background:var(--swim)"></div></div><span id="lbl-swim">0%</span></div>
      <div class="disc-bar"><span>🚴</span><div class="disc-bar-track"><div class="disc-bar-fill" id="bar-bike" style="width:0%;background:var(--bike)"></div></div><span id="lbl-bike">0%</span></div>
      <div class="disc-bar"><span>🏃</span><div class="disc-bar-track"><div class="disc-bar-fill" id="bar-run" style="width:0%;background:var(--run)"></div></div><span id="lbl-run">0%</span></div>
      <div class="disc-bar"><span>🏋️</span><div class="disc-bar-track"><div class="disc-bar-fill" id="bar-weights" style="width:0%;background:var(--weights)"></div></div><span id="lbl-weights">0%</span></div>
    </div>
  </div>
</div>

<div class="phase-nav">
  <div class="phase-nav-inner">
    <button class="phase-btn active" onclick="showPhase(0)">Phase 1 · Base</button>
    <button class="phase-btn" onclick="showPhase(1)">Phase 2 · Build</button>
    <button class="phase-btn" onclick="showPhase(2)">Phase 3 · Sharpen</button>
    <button class="phase-btn" onclick="showPhase(3)">Phase 4 · Taper</button>
    <button class="phase-btn" onclick="showStrength()">Strength Log</button>
  </div>
</div>

<main id="main-content"></main>

<script>

const STORAGE_KEY = 'dave_tri_tracker_v2';

// Phase 3 (wks 11-14): tempo all three, brick intensity
// Phase 4 (wks 15-16): taper, drop tempo

const WEEKS = [
  // ── PHASE 1: BASE ──────────────────────────────────────────────────────────

    {disc:'tempo-bike', title:'Tempo bike', detail:'50 min total. Warm up 15 min zone 2, then 2×8 min at a comfortably hard effort (zone 3–4, you can speak in short sentences), 5 min easy between, cool down 10 min.', tempo:'🔴 Tempo: 2×8 min threshold effort on the bike. Rate of perceived exertion ~7/10.'},

  {num:4, dates:'Jun 9 – Jun 15', phase:0,

   sessions:[
    {disc:'swim', title:'Easy swim', detail:'300m easy. No pressure, just feel the water.'},
    {disc:'bike', title:'Zone 2 ride', detail:'40 min easy. Recovery ride only.'},

const PHASES = [
  {idx:0, label:'Phase 1 · Base', note:'<strong>Focus: Build the aerobic base. Tempo introduced on bike only (your strength).</strong> Weeks 1–3 add progressive bike tempo — 2×8 min building to 2×10 min. Swim and run stay easy only. Week 4 is a recovery week with no intensity. The 80/20 rule: roughly 1 hard session per week, everything else genuinely easy.'},
  {idx:1, label:'Phase 2 · Build', note:'<strong>Focus: Tempo across all three disciplines, volume increasing.</strong> From week 5, swim gets threshold sets, run gets tempo, bike tempo continues to grow. Week 8 and week 12 are recovery weeks — do not skip them. The key rule: when easy days follow tempo days, keep them truly easy or the tempo work won\'t stick.'},
  {idx:2, label:'Phase 3 · Sharpen', note:'<strong>Focus: Race-specific intensity, brick sessions, race simulations.</strong> Tempo shifts from "training hard" to "race pace" — you\'re rehearsing what Sept 12 will feel like. Week 12 is a mini recovery. Week 13 includes a full race-distance swim at race pace. Trust the process.'},
  {idx:3, label:'Phase 4 · Taper', note:'<strong>Focus: Rest, sharpen, arrive fresh.</strong> Volume drops 40% in week 15. No hard tempo — just a few strides to keep the legs sharp. Race week is almost entirely rest. Taper madness (feeling sluggish, doubting your fitness) is completely normal. Your body is storing energy. Do not add extra workouts.'},
];

const WEEK1 = new Date('2025-05-19');
function weekStart(w) { const d = new Date(WEEK1); d.setDate(d.getDate() + (w-1)*7); return d; }
function fmtDate(d) { return d.toLocaleDateString('en-US', {month:'short', day:'numeric'}); }

const TEMPO_DISCS = ['tempo-swim','tempo-bike','tempo-run'];

let completed = {};
let currentPhase = 0;

function load() {
  try { const r = localStorage.getItem(STORAGE_KEY); if (r) completed = JSON.parse(r); } catch(e) {}
}
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(completed)); } catch(e) {}
}

function toggle(id) {
  completed[id] = !completed[id];
  save();
  showPhase(currentPhase);
}

function toggleWeek(num) {
  const d = document.getElementById('days-' + num);
  const c = document.getElementById('chev-' + num);
  if (d) { d.classList.toggle('open'); c.classList.toggle('open'); }
}

function discLabel(disc) {
  const map = {'swim':'swim','bike':'bike','run':'run','weights':'weights','brick':'brick','rest':'rest','tempo-swim':'tempo swim','tempo-bike':'tempo bike','tempo-run':'tempo run'};
  return map[disc] || disc;
}

function badgeClass(disc) {
  const map = {'swim':'badge-swim','bike':'badge-bike','run':'badge-run','weights':'badge-weights','brick':'badge-brick','rest':'badge-rest','tempo-swim':'badge-tempo-swim','tempo-bike':'badge-tempo-bike','tempo-run':'badge-tempo-run'};
  return map[disc] || 'badge-rest';
}

function showPhase(phaseIdx) {
  currentPhase = phaseIdx;
  document.querySelectorAll('.phase-btn').forEach((b,i) => b.classList.toggle('active', i === phaseIdx));
  const ph = PHASES[phaseIdx];
  const weeks = WEEKS.filter(w => w.phase === phaseIdx);

  let html = `<div class="phase-note">${ph.note}</div>`;
  html += `<div class="intensity-legend"><strong>🔴 Tempo/Threshold sessions</strong> are marked with a red left border and labelled in red. These are your ~20% high-intensity work. Keep the remaining sessions genuinely easy — conversational pace, zone 2 only.</div>`;

  weeks.forEach(wk => {
    const workouts = wk.sessions.filter(s => s.disc !== 'rest');
    const doneCt = workouts.filter((s,i) => completed[`w${wk.num}d${wk.sessions.indexOf(s)+1}`]).length;
    const allDone = workouts.length > 0 && doneCt === workouts.length;
    const pct = workouts.length ? Math.round(doneCt / workouts.length * 100) : 0;

    const pips = wk.sessions.map((s,i) => {
      const id = `w${wk.num}d${i+1}`;
      let cls = '';
      if (s.disc === 'rest') cls = 'rest';
      else if (completed[id]) cls = 'done';
      else if (TEMPO_DISCS.includes(s.disc)) cls = 'tempo';
      return `<div class="pip ${cls}" title="${DAYS[i]}: ${s.title}"></div>`;
    }).join('');

    const daysHtml = wk.sessions.map((s,i) => {
      const id = `w${wk.num}d${i+1}`;
      const isRest = s.disc === 'rest';
      const isTempo = TEMPO_DISCS.includes(s.disc);
      const isDone = completed[id];
      return `<div class="day-row ${isDone ? 'completed' : ''} ${isRest ? 'rest-day' : ''} ${isTempo ? 'tempo-day' : ''}">
        <div class="day-check ${isDone ? 'checked' : ''} ${isRest ? 'rest-check' : ''}" onclick="${isRest ? '' : `toggle('${id}')`}">${isDone ? '✓' : ''}</div>
        <div class="day-info">
          <div class="day-name-label">${DAYS[i]}</div>
          <div class="day-title">${s.title}</div>
          <div class="day-detail">${s.detail}</div>
          ${s.tempo ? `<div class="tempo-note">${s.tempo}</div>` : ''}
        </div>
        <div class="disc-badge ${badgeClass(s.disc)}">${discLabel(s.disc)}</div>
      </div>`;
    }).join('');

    if (wk.num === 16) {
      html += `<div class="race-day-card"><div style="font-size:3rem;margin-bottom:.75rem">🏁</div><h2>Race Day — September 12</h2><p>750m swim · 20km bike · 5km run<br>16 weeks of work. Trust it.</p></div>`;
    }

    html += `<div class="week ${allDone ? 'week-complete' : ''}" id="week-${wk.num}">
      <div class="week-header" onclick="toggleWeek(${wk.num})">
        <div>
          <div class="week-label">Week ${wk.num}${allDone ? ' ✓' : ''}</div>
          <div class="week-dates">${wk.dates} · ${wk.note.substring(0,55)}...</div>
        </div>
        <div class="week-progress">
          <div class="week-pips">${pips}</div>
          <div class="week-pct">${pct}%</div>
          <div class="week-chevron" id="chev-${wk.num}">▼</div>
        </div>
      </div>
      <div class="week-days" id="days-${wk.num}">${daysHtml}</div>
    </div>`;
  });

  document.getElementById('main-content').innerHTML = html;
  updateStats();
}

function updateStats() {
  let total = 0, done = 0;
  const disc = {swim:[0,0], bike:[0,0], run:[0,0], weights:[0,0]};
  let weeksComplete = 0;

  WEEKS.forEach(wk => {
    const workouts = wk.sessions.filter(s => s.disc !== 'rest');
    const wDone = workouts.filter(s => completed[`w${wk.num}d${wk.sessions.indexOf(s)+1}`]).length;
    if (workouts.length && wDone === workouts.length) weeksComplete++;
    workouts.forEach(s => {
      const id = `w${wk.num}d${wk.sessions.indexOf(s)+1}`;
      total++; if (completed[id]) done++;
      const base = s.disc.replace('tempo-','');
      if (disc[base]) { disc[base][0]++; if (completed[id]) disc[base][1]++; }
      else if (s.disc === 'brick') { disc.bike[0]++; if (completed[id]) disc.bike[1]++; }
    });
  });

  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-pct').textContent = pct+'%';
  document.getElementById('stat-weeks').textContent = weeksComplete;
  document.getElementById('main-bar').style.width = pct+'%';

  [['swim','swim'],['bike','bike'],['run','run'],['weights','weights']].forEach(([k,sfx]) => {
    const p = disc[k][0] ? Math.round(disc[k][1]/disc[k][0]*100) : 0;
    document.getElementById('bar-'+sfx).style.width = p+'%';
    document.getElementById('lbl-'+sfx).textContent = p+'%';
  });
}

// ── STRENGTH PROGRAM ─────────────────────────────────────────────────────────
const STR_A = [
  {name:'Barbell back squat', note:'Squat rack', sets:'3 × 12–15', cat:'lower', cue:'Depth to parallel. Drive knees out. Key for run and bike power.'},
  {name:'Romanian deadlift', note:'Barbell or dumbbells', sets:'3 × 12–15', cat:'lower', cue:'Hinge at hip, soft knee. Feel the hamstring stretch. Protects sciatica.'},
  {name:'Pull-ups / assisted pull-ups', note:'Pull-up bar', sets:'3 × 12–15', cat:'upper', cue:'Use band for assistance if needed. Builds swim pull strength.'},
  {name:'Dumbbell reverse lunge', note:'Dumbbells', sets:'3 × 12 each leg', cat:'lower', cue:'Step back, not forward — easier on knees and sciatica.'},
  {name:'Dumbbell bench press', note:'Bench + dumbbells', sets:'3 × 12–15', cat:'upper', cue:'Full range of motion. Maintains posture on the bike.'},
  {name:'Dead bug', note:'Bodyweight', sets:'3 × 12 each side', cat:'core', cue:'Press low back into floor throughout. Key sciatica-prevention exercise.'},
  {name:'Clamshell', note:'Band optional', sets:'3 × 20 each side', cat:'lower', cue:'Hip abductor strength. Protects IT band — critical for run injury prevention.'},
  {name:'Face pull / rear delt fly', note:'Dumbbells bent-over', sets:'3 × 15', cat:'upper', cue:'Keeps shoulders healthy for swimming.'},
];
const STR_B = [
  {name:'Goblet squat', note:'Single dumbbell', sets:'3 × 15', cat:'lower', cue:'Hold at chest, squat deep, elbows inside knees.'},
  {name:'Single-leg deadlift', note:'Dumbbells', sets:'3 × 12 each leg', cat:'lower', cue:'Hinge on one leg, keep hips square. Builds glute stability for sciatica.'},
  {name:'Dumbbell row', note:'Bench + dumbbell', sets:'3 × 12–15 each side', cat:'upper', cue:'Pull elbow to hip. Same pull pattern as freestyle swim.'},
  {name:'Bulgarian split squat', note:'Bench + dumbbells', sets:'3 × 12 each leg', cat:'lower', cue:'Rear foot on bench. Hardest exercise — go light first.'},
  {name:'Dumbbell shoulder press', note:'Seated or standing', sets:'3 × 12–15', cat:'upper', cue:'Don\'t flare elbows wide. Shoulder stability for swimming.'},
  {name:'Bird dog', note:'Bodyweight', sets:'3 × 12 each side', cat:'core', cue:'Hold 2 sec at top. Lumbar stability — directly addresses sciatica.'},
  {name:'Glute bridge / hip thrust', note:'Barbell or bodyweight', sets:'3 × 15', cat:'lower', cue:'Full hip extension, squeeze hard. Load with barbell when easy.'},
  {name:'Pallof press / anti-rotation', note:'Dumbbell at chest', sets:'3 × 12 each side', cat:'core', cue:'Resist rotation. Core stability for all three disciplines.'},
];

// Build 2 sessions per week × 16 weeks
const STR_WEEKS = [];
for (let w = 1; w <= 16; w++) {
  const phase = w <= 4 ? 1 : w <= 10 ? 2 : w <= 14 ? 3 : 4;
  const taper = phase >= 3;
  const raceWk = w === 16;
  STR_WEEKS.push({
    num: w,
    sessions: [
      { id: `s${w}a`, label: 'Workout A', sub: taper ? (raceWk ? 'Skip race week' : 'Reduced — 2 sets, lighter weight') : 'Full program', exercises: STR_A, skip: raceWk },
      { id: `s${w}b`, label: 'Workout B', sub: taper ? (raceWk ? 'Skip race week' : 'Reduced — 2 sets, lighter weight') : 'Full program', exercises: STR_B, skip: raceWk },
    ]
  });
}

function showStrength() {
  document.querySelectorAll('.phase-btn').forEach((b,i) => b.classList.toggle('active', i === 4));
  document.getElementById('phase-note').style.display = 'none';

  let html = `<div class="phase-note" style="display:block">
    <strong>Full body strength — 2×/week, 12–15 reps.</strong> Workout A and B alternate each week. Drop to 2 sets in Phase 3 (weeks 11–14). Skip entirely race week. Check off each session when done — individual exercises expand for reference.
    <br><br><strong>Sciatica watch:</strong> if barbell squat, RDL, or Bulgarian split squat cause nerve pain, substitute goblet squat + glute bridge and skip the offending exercise.
  </div>`;

  STR_WEEKS.forEach(wk => {
    const doneCount = wk.sessions.filter(s => completed['str_' + s.id]).length;
    const allDone = doneCount === 2 && !wk.sessions[0].skip;
    const pct = wk.sessions[0].skip ? 100 : Math.round(doneCount / 2 * 100);

    const pips = wk.sessions.map(s => {
      const cls = s.skip ? 'rest' : completed['str_' + s.id] ? 'done' : '';
      return `<div class="pip ${cls}"></div>`;
    }).join('');

    const sessionsHtml = wk.sessions.map(s => {
      const isDone = completed['str_' + s.id];
      const exHtml = s.exercises.map(ex => `
        <div class="str-ex-row">
          <div><div class="str-ex-name">${ex.name}</div><div class="str-ex-note">${ex.note}</div>
          <span class="str-badge str-${ex.cat}">${ex.cat}</span></div>
          <div class="str-sets">${ex.sets}</div>
          <div class="str-cue">${ex.cue}</div>
        </div>`).join('');

      return `<div class="str-session">
        <div class="str-session-hdr">
          <div class="day-check ${isDone ? 'checked' : ''} ${s.skip ? 'rest-check' : ''}"
            onclick="${s.skip ? '' : `toggleStr('${s.id}')`}"
            title="${s.skip ? 'Skip race week' : isDone ? 'Mark incomplete' : 'Mark complete'}"
          >${isDone ? '✓' : ''}</div>
          <div>
            <div class="str-session-title">${s.label}</div>
            <div class="str-session-sub">${s.sub}</div>
          </div>
          <div style="margin-left:auto;font-size:10px;color:var(--muted);cursor:pointer" onclick="toggleStrEx('ex-${wk.num}-${s.id}')">expand ▾</div>
        </div>
        <div class="str-days" id="ex-${wk.num}-${s.id}">${exHtml}</div>
      </div>`;
    }).join('');

    html += `<div class="str-week ${allDone ? 'str-complete' : ''}" id="str-week-${wk.num}">
      <div class="str-week-hdr" onclick="toggleStrWeek(${wk.num})">
        <div>
          <div style="font-size:12px;font-weight:500;">Week ${wk.num}${allDone ? ' ✓' : ''}</div>
          <div style="font-size:10px;color:var(--muted);">2 sessions · ${pct}% complete</div>
        </div>
        <div style="display:flex;align-items:center;gap:.6rem;">
          <div style="display:flex;gap:3px;">${pips}</div>
          <div class="week-chevron" id="str-chev-${wk.num}">▼</div>
        </div>
      </div>
      <div class="str-days" id="str-days-${wk.num}">${sessionsHtml}</div>
    </div>`;
  });

  document.getElementById('main-content').innerHTML = html;
  updateStrStats();
}

function toggleStrWeek(num) {
  const d = document.getElementById('str-days-' + num);
  const c = document.getElementById('str-chev-' + num);
  if (d) { d.classList.toggle('open'); c.classList.toggle('open'); }
}

function toggleStrEx(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}

function toggleStr(id) {
  completed['str_s' + id] = !completed['str_s' + id];
  save();
  showStrength();
}

function updateStrStats() {
  let done = 0, total = 0;
  STR_WEEKS.forEach(wk => {
    wk.sessions.forEach(s => {
      if (!s.skip) { total++; if (completed['str_' + s.id]) done++; }
    });
  });
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-pct').textContent = pct + '%';
  document.getElementById('stat-weeks').textContent = Math.floor(done / 2);
  document.getElementById('main-bar').style.width = pct + '%';
  ['swim','bike','run','weights'].forEach(k => {
    document.getElementById('bar-'+k).style.width = '0%';
    document.getElementById('lbl-'+k).textContent = '—';
  });
}

load();
showPhase(0);
